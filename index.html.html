<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>File Name Generator</title>

<style>
  body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #1F4E79, #4A90E2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .container {
    background: #ffffff;
    padding: 30px;
    border-radius: 12px;
    width: 420px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
  }

  h2 {
    text-align: center;
    color: #1F4E79;
    margin-bottom: 5px;
  }

  .subtitle {
    text-align: center;
    font-size: 12px;
    color: gray;
    margin-bottom: 20px;
  }

  label {
    font-weight: 600;
    font-size: 13px;
    color: #333;
    margin-bottom: 4px;
    display: block;
  }

  select, input {
    width: 100%;
    padding: 9px;
    margin: 6px 0 14px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
    background-color: #f2f6fb;
  }

  select:focus, input:focus {
    border-color: #4A90E2;
    outline: none;
    background-color: #ffffff;
  }

  .output {
    background-color: #e3f2fd;
    padding: 14px;
    border-radius: 6px;
    text-align: center;
    font-weight: bold;
    font-size: 14px;
    margin-top: 10px;
    color: #1F4E79;
    word-wrap: break-word;
  }

  button {
    width: 100%;
    padding: 11px;
    background: #1F4E79;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 12px;
    font-weight: bold;
  }

  button:hover {
    background: #163a5c;
  }

  .hidden {
    display: none;
  }

  .checkbox-group {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 5px;
    margin-bottom: 10px;
  }

</style>

</head>

<body>

<div class="container">

  <h2>FILE NAME GENERATOR</h2>
  <div class="subtitle">Automated File Naming Tool</div>

<label>Report Type</label> <select id="reportType" onchange="toggleFields(); generateName();"> <option value="">Select</option> <option value="Monthly">Monthly</option> <option value="Quarterly">Quarterly</option> <option value="Annual">Annual</option> </select>

  <div id="monthField">
    <label>Month</label>
    <select id="month" onchange="generateName()">
      <option value="">Select</option>
      <option>01</option><option>02</option><option>03</option>
      <option>04</option><option>05</option><option>06</option>
      <option>07</option><option>08</option><option>09</option>
      <option>10</option><option>11</option><option>12</option>
    </select>
  </div>

  <div id="quarterField">
    <label>Quarter</label>
    <select id="quarter" onchange="generateName()">
      <option value="">Select</option>
      <option>Q1</option>
      <option>Q2</option>
      <option>Q3</option>
      <option>Q4</option>
    </select>
  </div>

  </select>

<label>Company Name</label> <input type="text" id="company" oninput="generateName()" placeholder="e.g. ABC">

<label>Year</label> <input type="number" id="year" oninput="generateName()" placeholder="e.g. 2026">

<label>Version (optional)</label> <input type="text" id="version" oninput="generateName()" placeholder="e.g. v1">

  <!-- CLEAN CHECKBOX -->

  <div class="checkbox-group">
    <input type="checkbox" id="wtrrc" onchange="generateName()">
    <label for="wtrrc" style="margin: 0; font-weight: normal;">Include wTRRC</label>
  </div>

  <div class="output" id="output">Generated file name will appear here</div>

<button onclick="copyText()">Copy File Name</button>

</div>

<script>

function toggleFields() {
  let type = document.getElementById("reportType").value;

  document.getElementById("monthField").classList.add("hidden");
  document.getElementById("quarterField").classList.add("hidden");

  if (type === "Monthly") {
    document.getElementById("monthField").classList.remove("hidden");
  } else if (type === "Quarterly") {
    document.getElementById("quarterField").classList.remove("hidden");
  }
}

function generateName() {
  let type = document.getElementById("reportType").value;
  let month = document.getElementById("month").value;
  let quarter = document.getElementById("quarter").value;
  let doc = document.getElementById("docType").value;
  let company = document.getElementById("company").value.toUpperCase();
  let year = document.getElementById("year").value;
  let version = document.getElementById("version").value;
  let wtrrc = document.getElementById("wtrrc").checked;

  let result = "";

  if (!doc || !company) {
    document.getElementById("output").innerText = "⚠ Complete required fields";
    return;
  }

  if (type === "Monthly") {
    result = month + "_" + doc + "_" + company;
  } else if (type === "Quarterly") {
    result = quarter + "_" + doc + "_" + company;
  } else if (type === "Annual") {
    result = doc + "_" + company + "_" + year;
  }

  if (version) {
    result += "_" + version;
  }

  if (wtrrc) {
    result += "_wTRRC";
  }

  document.getElementById("output").innerText = result;
}

function copyText() {
  let text = document.getElementById("output").innerText;
  navigator.clipboard.writeText(text);
  alert("Copied: " + text);
}

</script>

</body>
</html>
